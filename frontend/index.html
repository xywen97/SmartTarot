<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 塔罗占卜</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">

  <!-- html2canvas for share feature -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <section class="login-gate" id="login-gate">
    <div class="login-gate-bg">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="login-gate-card">
      <div class="login-gate-brand">
        <h1>🌙 AI 塔罗占卜 🌙</h1>
        <p>登录后同步你的占卜历史、日记与每日塔罗趋势</p>
      </div>
      <div class="auth-form-panel gate-auth-form">
        <div class="auth-tabs">
          <button class="active" id="gate-login-tab">登录</button>
          <button id="gate-register-tab">注册</button>
        </div>
        <input type="email" id="gate-auth-email" placeholder="邮箱">
        <div class="password-field">
          <input type="password" id="gate-auth-password" placeholder="密码（至少 8 位）">
          <button type="button" class="password-toggle" data-target="gate-auth-password" title="显示/隐藏密码">👁</button>
        </div>
        <div class="password-field hidden" id="gate-auth-confirm-row">
          <input type="password" id="gate-auth-password-confirm" placeholder="再次输入密码">
          <button type="button" class="password-toggle" data-target="gate-auth-password-confirm" title="显示/隐藏密码">👁</button>
        </div>
        <input type="text" id="gate-auth-display-name" class="hidden" placeholder="昵称">
        <button class="btn" id="gate-auth-submit">登录</button>
        <div class="auth-status" id="gate-auth-status"></div>
      </div>
    </div>
  </section>

  <div class="top-actions">
    <button class="theme-toggle" id="theme-toggle" title="切换主题">☀️</button>
    <button class="auth-toggle" id="auth-toggle" title="登录与云同步">登录</button>
  </div>

  <div class="app-container">
    <header>
      <h1>🌙 AI 塔罗占卜 🌙</h1>
      <p class="subtitle">探索命运的神秘指引</p>
    </header>

    <main>
      <!-- 左上 - 问题输入区 -->
      <section class="section" id="question-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">🔮 你的问题</h2>
          <button class="btn btn-secondary btn-small" id="tarot-skills-info-btn"
                  style="width: auto; padding: 6px 12px; font-size: 0.85rem;"
                  title="了解 Tarot Skills 框架">
            🎴 Tarot Skills
          </button>
        </div>
        <div class="question-content">
          <!-- 牌阵选择 -->
          <div class="spread-selector">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <label for="spread-select">选择牌阵：</label>
              <button class="btn btn-secondary btn-small" id="recommend-btn" style="width: auto; padding: 6px 12px; font-size: 0.85rem;">
                🤖 智能推荐
              </button>
            </div>
            <select id="spread-select">
              <option value="single">单牌占卜（1张）</option>
              <option value="three_card">三牌阵（3张）</option>
              <option value="celtic_cross">凯尔特十字（10张）</option>
              <option value="relationship">关系牌阵（5张）</option>
              <option value="decision">决策牌阵（4张）</option>
              <option value="monthly">月度展望（7张）</option>
              <option value="custom">自定义牌阵</option>
            </select>
            <div id="recommend-reason" style="display: none; margin-top: 8px; padding: 8px; background: rgba(157, 78, 221, 0.1); border-radius: 6px; font-size: 0.85rem; color: var(--color-text-secondary);"></div>
          </div>

          <div class="reader-style-selector">
            <label for="reader-style-select">解读风格：</label>
            <select id="reader-style-select">
              <option value="">经典综合</option>
              <option value="gentle">温柔支持</option>
              <option value="direct">直接清醒</option>
              <option value="psychology">心理洞察</option>
              <option value="practical">现实行动</option>
            </select>
          </div>

          <div class="custom-spread-panel hidden" id="custom-spread-panel">
            <input type="text" id="custom-spread-name" placeholder="自定义牌阵名称，例如：搬家决策牌阵">
            <textarea id="custom-spread-positions" placeholder="每行一个位置，例如：
现状
选项 A 的机会
选项 B 的风险
最适合的行动"></textarea>
          </div>
          
          <textarea id="question-input" placeholder="请输入你想占卜的问题...

例如：
- 我目前的事业发展如何？
- 这段感情会有什么结果？
- 我该如何面对当前的挑战？"></textarea>

          <div class="question-templates" id="question-templates">
            <button type="button" data-question="这段关系现在真正的问题是什么？">关系</button>
            <button type="button" data-question="我接下来三个月的事业重点是什么？">事业</button>
            <button type="button" data-question="面对这个选择，我最需要看清什么？">决策</button>
            <button type="button" data-question="我最近反复卡住的内在模式是什么？">成长</button>
          </div>
          
          <div class="button-group">
            <button class="btn" id="draw-btn">开始占卜</button>
            <button class="btn btn-secondary" id="daily-btn">每日塔罗</button>
            <button class="btn btn-secondary" id="learn-btn">牌义学习</button>
            <button class="btn btn-secondary" id="history-btn">历史记录</button>
          </div>
        </div>
      </section>

      <!-- 左下 - 卡牌展示区 -->
      <section class="section" id="cards-section">
        <h2>🃏 抽取的牌</h2>
        <div class="cards-content">
          <div class="cards-container" id="cards-container">
            <div class="empty-state">
              <div class="empty-state-icon">🌟</div>
              <div class="empty-state-text">开始占卜后，卡牌将在这里显示</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 右侧 - 解读结果区 -->
      <section class="section" id="reading-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">✨ 塔罗解读</h2>
          <button class="btn btn-secondary btn-small" id="share-btn" style="width: auto; display: none;">
            📤 分享
          </button>
        </div>
        <div class="reading-content">
          <div class="reading-output" id="reading-output">
            <div class="empty-state">
              <div class="empty-state-icon">🔮</div>
              <div class="empty-state-text">AI 解读将在这里显示</div>
            </div>
          </div>
          <div class="follow-up-panel hidden" id="follow-up-panel">
            <textarea id="follow-up-input" placeholder="围绕这次牌面继续追问，例如：我现在最该先做哪一步？"></textarea>
            <button class="btn btn-secondary btn-small" id="follow-up-btn">继续追问</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 历史记录模态框 -->
  <div id="history-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📚 历史记录</h2>
        <button class="modal-close" id="history-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="history-controls">
          <input type="text" id="history-search" placeholder="搜索问题...">
          <button class="btn btn-small" id="clear-history">隐藏全部</button>
        </div>
        <div class="daily-trends" id="daily-trends"></div>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- 牌义学习中心 -->
  <div id="learn-modal" class="modal">
    <div class="modal-content learn-modal-content">
      <div class="modal-header">
        <h2>📖 牌义学习</h2>
        <button class="modal-close" id="learn-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="learn-controls">
          <input type="text" id="learn-search" placeholder="搜索牌名、关键词、元素或星象...">
          <select id="learn-filter">
            <option value="all">全部牌</option>
            <option value="major">大阿尔卡纳</option>
            <option value="wands">权杖</option>
            <option value="cups">圣杯</option>
            <option value="swords">宝剑</option>
            <option value="pentacles">星币</option>
          </select>
        </div>
        <div class="learn-deck" id="learn-deck"></div>
      </div>
    </div>
  </div>

  <!-- 占卜日记编辑 -->
  <div id="journal-modal" class="modal">
    <div class="modal-content journal-modal-content">
      <div class="modal-header">
        <h2>📝 占卜日记</h2>
        <button class="modal-close" id="journal-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="journal-summary" id="journal-summary"></div>
        <label class="journal-label" for="journal-tags">标签（用逗号分隔）</label>
        <input type="text" id="journal-tags" placeholder="例如：事业, 每日塔罗, 已验证">
        <label class="journal-label" for="journal-note">我的记录</label>
        <textarea id="journal-note" placeholder="记录当时的感受、后续发展、验证结果或下一步行动..."></textarea>
        <div class="journal-actions">
          <button class="btn" id="journal-save">保存日记</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 登录与云同步 -->
  <div id="auth-modal" class="modal">
    <div class="modal-content auth-modal-content">
      <div class="modal-header">
        <h2>☁️ 登录与云同步</h2>
        <button class="modal-close" id="auth-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="auth-user-panel hidden" id="auth-user-panel">
          <div id="auth-user-info"></div>
          <div class="auth-actions">
            <button class="btn" id="sync-now-btn">立即同步</button>
            <button class="btn btn-secondary" id="logout-btn">退出登录</button>
          </div>
        </div>
        <div class="auth-form-panel" id="auth-form-panel">
          <div class="auth-tabs">
            <button class="active" id="auth-login-tab">登录</button>
            <button id="auth-register-tab">注册</button>
          </div>
          <input type="email" id="auth-email" placeholder="邮箱">
          <div class="password-field">
            <input type="password" id="auth-password" placeholder="密码（至少 8 位）">
            <button type="button" class="password-toggle" data-target="auth-password" title="显示/隐藏密码">👁</button>
          </div>
          <div class="password-field hidden" id="auth-confirm-row">
            <input type="password" id="auth-password-confirm" placeholder="再次输入密码">
            <button type="button" class="password-toggle" data-target="auth-password-confirm" title="显示/隐藏密码">👁</button>
          </div>
          <input type="text" id="auth-display-name" class="hidden" placeholder="昵称">
          <button class="btn" id="auth-submit">登录</button>
        </div>
        <div class="auth-status" id="auth-status"></div>
      </div>
    </div>
  </div>

  <!-- JavaScript 模块 -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
