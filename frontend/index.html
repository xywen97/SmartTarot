<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 塔罗占卜</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">
  <link rel="stylesheet" href="css/themes.css">

  <!-- html2canvas for share feature -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <!-- 主题切换按钮 -->
  <button class="theme-toggle" id="theme-toggle" title="切换主题">☀️</button>

  <div class="app-container">
    <header>
      <h1>🌙 AI 塔罗占卜 🌙</h1>
      <p class="subtitle">探索命运的神秘指引</p>
    </header>

    <main>
      <!-- 左上 - 问题输入区 -->
      <section class="section" id="question-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">🔮 你的问题</h2>
          <button class="btn btn-secondary btn-small" id="tarot-skills-info-btn"
                  style="width: auto; padding: 6px 12px; font-size: 0.85rem;"
                  title="了解 Tarot Skills 框架">
            🎴 Tarot Skills
          </button>
        </div>
        <div class="question-content">
          <!-- 牌阵选择 -->
          <div class="spread-selector">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
              <label for="spread-select">选择牌阵：</label>
              <button class="btn btn-secondary btn-small" id="recommend-btn" style="width: auto; padding: 6px 12px; font-size: 0.85rem;">
                🤖 智能推荐
              </button>
            </div>
            <select id="spread-select">
              <option value="single">单牌占卜（1张）</option>
              <option value="three_card">三牌阵（3张）</option>
              <option value="celtic_cross">凯尔特十字（10张）</option>
            </select>
            <div id="recommend-reason" style="display: none; margin-top: 8px; padding: 8px; background: rgba(157, 78, 221, 0.1); border-radius: 6px; font-size: 0.85rem; color: var(--color-text-secondary);"></div>
          </div>
          
          <textarea id="question-input" placeholder="请输入你想占卜的问题...

例如：
- 我目前的事业发展如何？
- 这段感情会有什么结果？
- 我该如何面对当前的挑战？"></textarea>
          
          <div class="button-group">
            <button class="btn" id="draw-btn">开始占卜</button>
            <button class="btn btn-secondary" id="history-btn">历史记录</button>
          </div>
        </div>
      </section>

      <!-- 左下 - 卡牌展示区 -->
      <section class="section" id="cards-section">
        <h2>🃏 抽取的牌</h2>
        <div class="cards-content">
          <div class="cards-container" id="cards-container">
            <div class="empty-state">
              <div class="empty-state-icon">🌟</div>
              <div class="empty-state-text">开始占卜后，卡牌将在这里显示</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 右侧 - 解读结果区 -->
      <section class="section" id="reading-section">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <h2 style="margin: 0;">✨ 塔罗解读</h2>
          <button class="btn btn-secondary btn-small" id="share-btn" style="width: auto; display: none;">
            📤 分享
          </button>
        </div>
        <div class="reading-content">
          <div class="reading-output" id="reading-output">
            <div class="empty-state">
              <div class="empty-state-icon">🔮</div>
              <div class="empty-state-text">AI 解读将在这里显示</div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- 历史记录模态框 -->
  <div id="history-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>📚 历史记录</h2>
        <button class="modal-close" id="history-close">&times;</button>
      </div>
      <div class="modal-body">
        <div class="history-controls">
          <input type="text" id="history-search" placeholder="搜索问题...">
          <button class="btn btn-small" id="clear-history">清空全部</button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>
    </div>
  </div>

  <!-- JavaScript 模块 -->
  <script type="module" src="js/main.js"></script>
</body>
</html>
